name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: eks-demo-app
  EKS_CLUSTER_NAME: eks-devops-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build application
      run: |
        cd app/springboot-app/eks-demo
        mvn clean package

    - name: Set image tag
      id: vars
      run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Build Docker image
      run: |
        docker build -t $ECR_REPOSITORY:$TAG app/springboot-app/eks-demo

    - name: Tag Docker image
      run: |
        docker tag $ECR_REPOSITORY:$TAG 039952648478.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:$TAG

    - name: Push Docker image
      run: |
        docker push 039952648478.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:$TAG

    - name: Update kubeconfig
      run: |
        aws eks --region $AWS_REGION update-kubeconfig --name $EKS_CLUSTER_NAME

    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/eks-demo-deployment eks-demo-container=039952648478.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:$TAG
