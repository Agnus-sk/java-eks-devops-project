apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-demo-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eks-demo
  template:
    metadata:
      labels:
        app: eks-demo
    spec:
      containers:
      - name: eks-demo-container
        image: 039952648478.dkr.ecr.ap-south-1.amazonaws.com/eks-demo-app:latest
        ports:
        - containerPort: 8081

